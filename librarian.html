<!DOCTYPE html>
<html>
<head>

<title>Librarian Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body class="blur-bg">

<!-- NAVBAR -->

<div class="navbar">

<div style="display:flex;align-items:center;gap:12px;">
<img src="logo.png" style="width:45px;">
<h2>Librarian Dashboard</h2>
</div>

<button onclick="logout()" class="login-btn" style="width:120px;height:35px;padding:0;">
Logout
</button>

</div>

<!-- MAIN -->

<div class="container">

<h3>Library Stats</h3>

<div class="stats">

<div class="stat-card">
Total Books
<h2 id="totalBooks">0</h2>
</div>

<div class="stat-card">
Books Issued
<h2 id="issuedCount">0</h2>
</div>

</div>

<br>

<!-- ADD BOOK -->

<h3>Add Book</h3>

<input class="field" id="title" placeholder="Book Name">
<input class="field" id="author" placeholder="Author">
<input class="field" id="qty" type="number" placeholder="Quantity">

<button class="login-btn" onclick="addBook()">Add Book</button>

<br><br>

<!-- BOOK LIST -->

<h3>Books in Library</h3>

<div id="bookList"></div>

<br>

<!-- ISSUED BOOKS -->

<h3>Issued Books</h3>

<div class="table-wrapper">

<table class="issued-table">

<thead>

<tr>
<th>Book</th>
<th>Student ID</th>
<th>Issued Date</th>
<th>Due Date</th>
<th>Fine</th>
<th>Action</th>
</tr>

</thead>

<tbody id="issuedList"></tbody>

</table>

</div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

/* ================= LOAD BOOKS ================= */

async function loadBooks(){

const res = await fetch(`${BASE_URL}/books`);
const data = await res.json();

const list = document.getElementById("bookList");

list.innerHTML="";

let total=0;

data.books.forEach(book=>{

total += book.quantity;

list.innerHTML += `

<div class="book-card">

<h4>${book.title}</h4>

<p>Author: ${book.author}</p>

<p>Available: ${book.quantity}</p>

</div>

`;

});

document.getElementById("totalBooks").innerText = total;

}

/* ================= LOAD ISSUED BOOKS ================= */

async function loadIssued(){

const res = await fetch(`${BASE_URL}/issues`);
const data = await res.json();

const list = document.getElementById("issuedList");

list.innerHTML="";

document.getElementById("issuedCount").innerText = data.issues.length;

data.issues.forEach(issue=>{

const today = new Date();
const due = new Date(issue.dueDate);

let fine = 0;

if(today > due){

const lateDays = Math.ceil((today - due)/(1000*60*60*24));
fine = lateDays;

}

list.innerHTML += `

<tr>

<td>${issue.bookId.title}</td>

<td>${issue.username}</td>

<td>${new Date(issue.issueDate).toDateString()}</td>

<td>${new Date(issue.dueDate).toDateString()}</td>

<td>₹${fine}</td>

<td>

<button onclick="returnBook('${issue._id}')" class="login-btn">
Return
</button>

</td>

</tr>

`;

});

}

/* ================= ADD BOOK ================= */

async function addBook(){

let title=document.getElementById("title").value;
let author=document.getElementById("author").value;
let quantity=document.getElementById("qty").value;

await fetch(`${BASE_URL}/books`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title,
author,
quantity
})

});

alert("Book Added");

document.getElementById("title").value="";
document.getElementById("author").value="";
document.getElementById("qty").value="";

loadBooks();

}

/* ================= RETURN BOOK ================= */

async function returnBook(issueId){

await fetch(`${BASE_URL}/issues/return`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
issueId
})

});

alert("Book Returned");

loadBooks();
loadIssued();

}

/* ================= LOGOUT ================= */

function logout(){

localStorage.clear();
window.location="index.html";

}

/* ================= INITIAL LOAD ================= */

loadBooks();
loadIssued();

</script>

</body>
</html>
