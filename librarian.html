<!DOCTYPE html>
<html>
<head>

<title>Librarian</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="blur-bg">

<div class="navbar">

<h2>Librarian Dashboard</h2>

<button onclick="logout()">Logout</button>

</div>

<div class="container">

<h3>Add Book</h3>

<input class="field" id="title" placeholder="Book Name">

<input class="field" id="author" placeholder="Author">

<input class="field" id="qty" type="number" placeholder="Quantity">

<button class="login-btn" onclick="addBook()">Add Book</button>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

async function addBook(){

let title=document.getElementById("title").value;
let author=document.getElementById("author").value;
let quantity=document.getElementById("qty").value;

await fetch(`${BASE_URL}/books`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title,
author,
quantity
})

});

alert("Book Added");

}

function logout(){

localStorage.clear();
window.location="index.html";

}

</script>

</body>
</html>
