<!DOCTYPE html>
<html>
<head>

<title>Librarian Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="blur-bg">

<!-- NAVBAR -->

<div class="navbar">

<div style="display:flex;align-items:center;gap:12px;">
<img src="logo.png" style="width:45px;">
<h2>Librarian Dashboard</h2>
</div>

<button onclick="logout()" class="login-btn" style="width:120px;height:35px;padding:0;">
Logout
</button>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

<!-- LIBRARY STATS -->

<h3>Library Stats</h3>

<div class="stats">

<div class="stat-card">
Total Books
<h2 id="totalBooks">0</h2>
</div>

<div class="stat-card">
Books Issued
<h2 id="issuedCount">0</h2>
</div>

</div>

<br>

<!-- ADD BOOK -->

<h3>Add Book</h3>

<input class="field" id="title" placeholder="Book Name">

<input class="field" id="author" placeholder="Author">

<input class="field" id="qty" type="number" placeholder="Quantity">

<button class="login-btn" onclick="addBook()">Add Book</button>

<br><br>

<!-- ISSUE BOOK -->

<h3>Issue Book</h3>

<input class="field" id="studentId" placeholder="Student ID">

<input class="field" id="bookTitle" placeholder="Book Name">

<button class="login-btn" onclick="issueBook()">Issue Book</button>

<br><br>

<!-- BOOK LIST -->

<h3>Books in Library</h3>

<div id="bookList"></div>

<br>

<!-- ISSUED BOOKS -->

<h3>Issued Books</h3>

<div id="issuedList"></div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";


/* LOAD BOOKS */

async function loadBooks(){

const res=await fetch(`${BASE_URL}/books`);
const data=await res.json();

const list=document.getElementById("bookList");

list.innerHTML="";

let total=0;

data.books.forEach(book=>{

total+=book.quantity;

list.innerHTML+=`

<div class="book-card">

<h4>${book.title}</h4>

<p>Author: ${book.author}</p>

<p>Available: ${book.quantity}</p>

<button onclick="deleteBook('${book._id}')" class="login-btn">
Delete
</button>

</div>

`;

});

document.getElementById("totalBooks").innerText=total;

}


/* LOAD ISSUED BOOKS */

async function loadIssued(){

const res=await fetch(`${BASE_URL}/issue`);
const data=await res.json();

const list=document.getElementById("issuedList");

list.innerHTML="";

document.getElementById("issuedCount").innerText=data.issued.length;

data.issued.forEach(book=>{

list.innerHTML+=`

<div class="book-card">

<h4>${book.title}</h4>

<p>Student ID: ${book.student}</p>

</div>

`;

});

}


/* ADD BOOK */

async function addBook(){

let title=document.getElementById("title").value;
let author=document.getElementById("author").value;
let quantity=document.getElementById("qty").value;

await fetch(`${BASE_URL}/books`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title,
author,
quantity
})

});

alert("Book Added");

document.getElementById("title").value="";
document.getElementById("author").value="";
document.getElementById("qty").value="";

loadBooks();

}


/* DELETE BOOK */

async function deleteBook(id){

await fetch(`${BASE_URL}/books/${id}`,{
method:"DELETE"
});

loadBooks();

}


/* ISSUE BOOK */

async function issueBook(){

let student=document.getElementById("studentId").value;
let title=document.getElementById("bookTitle").value;

await fetch(`${BASE_URL}/issue`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
student,
title
})

});

alert("Book Issued");

document.getElementById("studentId").value="";
document.getElementById("bookTitle").value="";

loadBooks();
loadIssued();

}


/* LOGOUT */

function logout(){

localStorage.clear();
window.location="index.html";

}


/* INITIAL LOAD */

loadBooks();
loadIssued();

</script>

</body>
</html>
