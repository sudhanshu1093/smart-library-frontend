<!DOCTYPE html>
<html>
<head>

<title>Librarian Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="blur-bg">

<div class="navbar">

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="width:40px;">
<h2>Librarian Dashboard</h2>
</div>

<button onclick="logout()" class="login-btn" style="width:120px;height:35px;padding:0;">Logout</button>

</div>

<div class="container">

<h3>Add Book</h3>

<input class="field" id="title" placeholder="Book Name">

<input class="field" id="author" placeholder="Author">

<input class="field" id="qty" type="number" placeholder="Quantity">

<button class="login-btn" onclick="addBook()">Add Book</button>

<br><br>

<h3>Books in Library</h3>

<div id="bookList"></div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

async function loadBooks(){

const res=await fetch(`${BASE_URL}/books`);
const data=await res.json();

const list=document.getElementById("bookList");

list.innerHTML="";

data.books.forEach(book=>{

list.innerHTML+=`

<div class="book-card">

<h4>${book.title}</h4>

<p>${book.author}</p>

<p>Quantity: ${book.quantity}</p>

</div>

`;

});

}

async function addBook(){

let title=document.getElementById("title").value;
let author=document.getElementById("author").value;
let quantity=document.getElementById("qty").value;

await fetch(`${BASE_URL}/books`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title,
author,
quantity
})

});

alert("Book Added");

loadBooks();

}

function logout(){

localStorage.clear();
window.location="index.html";

}

loadBooks();

</script>

</body>
</html>
