<!DOCTYPE html>
<html>

<head>

<title>Librarian Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#f4f6fb;
}

/* SIDEBAR */

.sidebar{

width:220px;

background:linear-gradient(135deg,#667eea,#764ba2);

color:white;

padding:25px 15px;

}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{

width:100%;

padding:10px;

margin:10px 0;

border:none;

border-radius:8px;

background:white;

color:#667eea;

font-weight:600;

cursor:pointer;

}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* CARD */

.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 8px 15px rgba(0,0,0,0.08);

margin-bottom:20px;

}

.card h3{
margin-bottom:10px;
}

/* INPUT */

input{

width:100%;

padding:10px;

margin:8px 0;

border-radius:6px;

border:1px solid #ccc;

}

/* BUTTON */

.add-btn{

background:#28a745;

color:white;

border:none;

padding:10px;

border-radius:6px;

cursor:pointer;

width:100%;

font-weight:600;

}

/* BOOK LIST */

.book-list div{

background:#f1f3ff;

padding:12px;

margin:8px 0;

border-radius:8px;

display:flex;

justify-content:space-between;

align-items:center;

}

/* MOBILE */

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
justify-content:center;
}

.main{
padding:20px;
}

}

</style>

</head>


<body>

<div class="sidebar">

<h2>📚 Librarian</h2>

<button onclick="logout()">Logout</button>

</div>


<div class="main">

<div class="card">

<h3>Add New Book</h3>

<input type="text" id="bookName" placeholder="Book Name">

<input type="text" id="authorname" placeholder="Author Name">

<input type="number" id="bookQty" placeholder="Quantity">

<button class="add-btn" onclick="addBook()">Add Book</button>

</div>


<div class="card">

<h3>All Books (<span id="totalBooks">0</span>)</h3>

<div class="book-list" id="bookList"></div>

</div>

</div>


<script>

const BASE_URL = "https://smart-library-backend-3762.onrender.com";

async function loadBooks(){

try{

const res = await fetch(`${BASE_URL}/books`);
const data = await res.json();

const list=document.getElementById("bookList");
const total=document.getElementById("totalBooks");

list.innerHTML="";
total.innerText=data.books.length;

data.books.forEach(book=>{

list.innerHTML += `
<div>
<b>${book.title}</b> by ${book.author}
<span>Qty: ${book.quantity}</span>
</div>
`;

});

}catch(err){

console.log(err);

}

}


async function addBook(){

const title=document.getElementById("bookName").value.trim();
const author=document.getElementById("authorname").value.trim();
const quantity=Number(document.getElementById("bookQty").value);

if(!title || !author || !quantity){
alert("Fill all fields");
return;
}

if(quantity<1){
alert("Quantity must be greater than 0");
return;
}

try{

const res = await fetch(`${BASE_URL}/books`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title,
author,
quantity
})

});

const data = await res.json();

if(data.success){

alert("Book added successfully");

document.getElementById("bookName").value="";
document.getElementById("authorname").value="";
document.getElementById("bookQty").value="";

loadBooks();

}else{

alert(data.message);

}

}catch(err){

alert("Server error");

}

}


function logout(){

window.location.href="index.html";

}

loadBooks();

</script>

</body>
</html>
