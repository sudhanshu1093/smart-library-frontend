<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="center-box">

<div class="login-card">

<h2>Register</h2>

<select class="field" id="role">
<option value="student">Student</option>
<option value="librarian">Librarian</option>
</select>

<input class="field" id="username" placeholder="Username">

<input class="field" id="password" type="password" placeholder="Password">

<button class="login-btn" onclick="register()">Register</button>

</div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

async function register(){

let role=document.getElementById("role").value;
let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

const res=await fetch(`${BASE_URL}/register`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
role,
username,
password
})

});

const data=await res.json();

if(data.success){
alert("Registered");
window.location="index.html";
}else{
alert(data.message);
}

}

</script>

</body>
</html>
