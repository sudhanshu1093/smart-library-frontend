<!DOCTYPE html>
<html>
<head>

<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<p class="tagline">
THE WORLD IS <b>HERE</b>. WHERE ARE <b>YOU</b>?
</p>

</div>

<div class="center-box">

<div class="login-card">

<div class="icon-circle">
<img src="earth.png" class="earth">
<img src="people.png" class="people">
</div>

<h2 style="color:#2C5F9E;">Register</h2>

<select class="field" id="role">
<option value="student">Student</option>
<option value="librarian">Librarian</option>
</select>

<input class="field" id="username" type="text" placeholder="System ID" maxlength="10" pattern="[0-9]{10}">

<input class="field" id="password" type="password" placeholder="Password">

<button class="login-btn" onclick="register()">Register</button>

<br><br>

<a href="index.html" class="back-login">Back to Login</a>

</div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

async function register(){

let role=document.getElementById("role").value;
let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

/* 10 digit system ID validation */

if(!/^[0-9]{10}$/.test(username)){
alert("System ID must be exactly 10 digits");
return;
}

const res=await fetch(`${BASE_URL}/register`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
role,
username,
password
})

});

const data=await res.json();

if(data.success){
alert("Registered Successfully");
window.location="index.html";
}else{
alert(data.message);
}

}

</script>

</body>
</html>
