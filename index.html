<!DOCTYPE html>
<html>
<head>
<title>Smart Library Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
background:white;
width:350px;
padding:35px;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
text-align:center;
}

.card h2{
margin-bottom:20px;
}

select,input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
color:white;
}

.login-btn{
background:#667eea;
}

.register-btn{
background:#28a745;
}
</style>
</head>

<body>

<div class="card">

<h2>📚 Smart Library</h2>

<form id="loginForm">

<select id="role">
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="librarian">Librarian</option>
</select>

<input
type="text"
id="username"
placeholder="System ID"
maxlength="10"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button type="submit" class="login-btn">Login</button>

</form>

<button onclick="goToRegister()" class="register-btn">Register</button>

<p id="error" style="color:red;margin-top:10px;"></p>

</div>

<script>

const BASE_URL = "https://smart-library-backend-3762.onrender.com";

document.getElementById("loginForm").addEventListener("submit", login);

async function login(e){

e.preventDefault();

const username = document.getElementById("username").value.trim();
const password = document.getElementById("password").value.trim();
const role = document.getElementById("role").value;
const error = document.getElementById("error");

error.innerText="";

if(!role){
error.innerText="Select role";
return;
}

try{

const res = await fetch(`${BASE_URL}/login`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
role,
username,
password
})
});

const data = await res.json();

if(data.success){

localStorage.setItem("token",data.token);
localStorage.setItem("role",role);
localStorage.setItem("username",username);

if(role==="student"){
window.location.href="student.html";
}else{
window.location.href="librarian.html";
}

}else{
error.innerText=data.message || "Invalid credentials";
}

}catch(err){
error.innerText="Server error";
}

}

function goToRegister(){
window.location.href="register.html";
}

</script>

</body>
</html>
