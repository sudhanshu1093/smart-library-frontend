<!DOCTYPE html>
<html>
<head>

<title>Smart Library Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<p class="tagline">
THE WORLD IS <span>HERE</span>. WHERE ARE <b>YOU</b>?
</p>

</div>

<div class="center-box">

<div class="login-card">

<h2>Smart Library Login</h2>

<form id="loginForm">

<select class="field" id="role">
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="librarian">Librarian</option>
</select>

<input class="field" type="text" id="username" placeholder="Username">

<input class="field" type="password" id="password" placeholder="Password">

<button class="login-btn">Sign In</button>

</form>

<a class="register" href="register.html">Register</a>

</div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

document.getElementById("loginForm").addEventListener("submit",async function(e){

e.preventDefault();

let role=document.getElementById("role").value;
let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(!role||!username||!password){
alert("Fill all fields");
return;
}

try{

const res=await fetch(`${BASE_URL}/login`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
role,
username,
password
})

});

const data=await res.json();

if(data.success){

localStorage.setItem("token",data.token);
localStorage.setItem("username",username);

if(role==="student"){
window.location="student.html";
}

if(role==="librarian"){
window.location="librarian.html";
}

}else{

alert(data.message);

}

}catch(err){

alert("Server error");

}

});

</script>

</body>
</html>
