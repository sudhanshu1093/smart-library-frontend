<!DOCTYPE html>
<html>
<head>

<title>Smart Library Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<p class="tagline">
THE WORLD IS HERE. WHERE ARE YOU?
</p>

</div>

<div class="center-box">

<div class="login-card">

<div class="icon-circle">
<img src="earth.png" class="earth">
<img src="people.png" class="people">
</div>

<h2>Login</h2>

<form id="loginForm">

<select class="field" id="role">
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="librarian">Librarian</option>
</select>

<input class="field" id="username" placeholder="Username">

<input class="field" id="password" type="password" placeholder="Password">

<button class="login-btn" type="submit">Login</button>

</form>

<br>

<a href="register.html">Register</a>

</div>

</div>

<script>

const BASE_URL = "https://smart-library-backend-3762.onrender.com";

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();   // THIS STOPS PAGE FROM JUMPING

let role = document.getElementById("role").value;
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(!role || !username || !password){
alert("Please fill all fields");
return;
}

const res = await fetch(`${BASE_URL}/login`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
role,
username,
password
})

});

const data = await res.json();

if(data.success){

localStorage.setItem("token",data.token);
localStorage.setItem("username",username);

if(role==="student"){
window.location="student.html";
}

if(role==="librarian"){
window.location="librarian.html";
}

}else{

alert(data.message);

}

});

</script>

</body>
</html>
