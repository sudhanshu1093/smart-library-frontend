<!DOCTYPE html>
<html>
<head>

<title>Campus Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<p class="tagline">THE WORLD IS <span>HERE</span>. WHERE ARE <b>YOU</b>?</p>

</div>


<div class="login-card">

<div class="icon-circle">

<img src="earth.gif" class="earth">

<img src="people.png" class="people">

</div>

<h2>Campus Login</h2>

<select class="field">
<option>Select Role</option>
<option>Student</option>
<option>Librarian</option>
</select>

<input class="field" type="text" placeholder="System ID">

<input class="field" type="password" placeholder="Password">

<button class="login-btn">Sign In</button>

<a class="register" href="register.html">Register</a>

</div>

</body>
</html>
