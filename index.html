<!DOCTYPE html>
<html>
<head>

<title>Smart Library Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<p class="tagline">
THE WORLD IS <span>HERE</span>. WHERE ARE <b>YOU</b>?
</p>

</div>

<div class="center-box">

<div class="login-card">

<div class="icon-circle">

<img src="earth.png" class="earth">
<img src="people.png" class="people">

</div>

<h2>Smart Library Login</h2>

<form id="loginForm">

<select class="field" id="role">
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="librarian">Librarian</option>
</select>

<input class="field" type="text" placeholder="System ID">

<input class="field" type="password" placeholder="Password">

<button class="login-btn">Sign In</button>

</form>

<a class="register" href="register.html">Register</a>

</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let role=document.getElementById("role").value;

if(role==="student") window.location="student.html";

if(role==="librarian") window.location="librarian.html";

});

</script>

</body>
</html>
