<!DOCTYPE html>
<html>
<head>
  <title>Smart Library Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#667eea,#764ba2);
    }

    .card{
      background:white;
      width:350px;
      padding:35px;
      border-radius:15px;
      box-shadow:0 15px 30px rgba(0,0,0,0.2);
      text-align:center;
      animation:fadeIn 0.6s ease-in-out;
    }

    .card h2{
      margin-bottom:20px;
      color:#333;
    }

    select,input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ddd;
      outline:none;
      transition:0.3s;
    }

    select:focus,input:focus{
      border-color:#667eea;
      box-shadow:0 0 5px rgba(102,126,234,0.5);
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
      color:white;
    }

    .login-btn{
      background:#667eea;
    }

    .login-btn:hover{
      background:#5563c1;
    }

    .register-btn{
      background:#28a745;
    }

    .register-btn:hover{
      background:#1e7e34;
    }

    #error{
      color:red;
      margin-top:10px;
      font-size:14px;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }
  </style>
</head>

<body>

<div class="card">

  <h2>📚 Smart Library</h2>

  <select id="role">
    <option value="">Select Role</option>
    <option value="student">Student</option>
    <option value="librarian">Librarian</option>
  </select>

  <!-- System ID input -->
  <input 
    type="text"
    id="username"
    placeholder="System ID (10 digits)"
    maxlength="10"
  >

  <input 
    type="password"
    id="password"
    placeholder="Password"
  >

  <button class="login-btn" onclick="login()">Login</button>

  <button class="register-btn" onclick="goToRegister()">Register</button>

  <p id="error"></p>

</div>

<script src="script.js"></script>

</body>
</html>
