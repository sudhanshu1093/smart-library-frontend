<!DOCTYPE html>
<html>
<head>

<title>Smart Library Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body class="login-page">

<div class="overlay">

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/414/414927.png" class="earth">

<h2>Smart Library</h2>

<p class="subtitle">Login Portal</p>

<select id="role">
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="librarian">Librarian</option>
<option value="admin">Admin</option>
</select>

<input type="text" id="systemId" placeholder="System ID">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<p id="error"></p>

<div class="links">
<a href="register.html">Create Account</a>
</div>

</div>

</div>

<script>

function login(){

let role=document.getElementById("role").value;
let id=document.getElementById("systemId").value;
let pass=document.getElementById("password").value;

if(role=="" || id=="" || pass==""){
document.getElementById("error").innerText="Please fill all fields";
return;
}

if(role=="student"){
window.location.href="student.html";
}

if(role=="librarian"){
window.location.href="librarian.html";
}

if(role=="admin"){
window.location.href="admin.html";
}

}

</script>

</body>
</html>
