<!DOCTYPE html>
<html>
<head>

<title>Smart Library Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<p class="tagline">
THE WORLD IS <span>HERE</span>. WHERE ARE <b>YOU</b>?
</p>

</div>


<div class="login-card">

<div class="icon-circle">

<img src="earth.png" class="earth">
<img src="people.png" class="people">

</div>

<h2>Smart Library Login</h2>

<form id="loginForm">

<select class="field" id="role">
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="librarian">Librarian</option>
</select>

<input class="field" type="text" id="systemId" placeholder="System ID">

<input class="field" type="password" id="password" placeholder="Password">

<button class="login-btn" type="submit">Sign In</button>

</form>

<a class="register" href="register.html">Register</a>

</div>


<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault(); // stop page reload

let role = document.getElementById("role").value;
let id = document.getElementById("systemId").value;
let pass = document.getElementById("password").value;

if(role === "" || id === "" || pass === ""){
alert("Please fill all fields");
return;
}

if(role === "student"){
window.location.href = "student.html";
}

if(role === "librarian"){
window.location.href = "librarian.html";
}

});

</script>

</body>
</html>
