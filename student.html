<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>
<link rel="stylesheet" href="style.css">

</head>

<body class="blur-bg">

<!-- NAVBAR -->

<div class="navbar">

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="width:40px;">
<h2>Student Dashboard</h2>
</div>

<!-- PROFILE IMAGE -->
<img src="profile.jpg" id="profileIcon" class="profile-icon">

</div>


<!-- LEFT SIDEBAR -->

<div id="sidebar" class="sidebar">

<h3>Student Profile</h3>

<p><b id="profileUsername"></b></p>

<div class="profile-stats">

<p>📚 Books Issued: <span id="issuedCount">0 / 3</span></p>

<p>💰 Total Dues: ₹<span id="dues">0</span></p>

<p>📅 Next Return: <span id="nextReturn">--</span></p>

</div>

<div class="profile-actions">
<button onclick="changePassword()">Change Password</button>
<button onclick="logout()">Logout</button>
</div>

</div>


<!-- MAIN DASHBOARD -->

<div class="container">

<input id="search" class="field" placeholder="Search books..." onkeyup="searchBooks()">

<h3>Available Books</h3>
<div id="bookList"></div>

<h3>My Issued Books</h3>
<div id="issuedList"></div>

</div>


<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

let books=[];
const username=localStorage.getItem("username");

/* SHOW USERNAME */

document.getElementById("profileUsername").innerText=username;


/* PROFILE CLICK → OPEN SIDEBAR */

window.onload=function(){

const profileIcon=document.getElementById("profileIcon");
const sidebar=document.getElementById("sidebar");

profileIcon.addEventListener("click",function(){
sidebar.classList.toggle("active");
});

};


/* LOAD BOOKS */

async function loadBooks(){

const res=await fetch(BASE_URL+"/books");
const data=await res.json();

books=data.books;
displayBooks(books);

}


/* DISPLAY BOOKS */

function displayBooks(bookArray){

const list=document.getElementById("bookList");

list.innerHTML="";

bookArray.forEach(function(book){

list.innerHTML+=`

<div class="book-card">

<b>${book.title}</b><br>
Author: ${book.author}<br>
Available: ${book.quantity}

<br><br>

${book.quantity>0
? `<button onclick="issueBook('${book._id}')">Issue</button>`
: `<button disabled>Not Available</button>`
}

</div>

`;

});

}


/* ISSUE BOOK */

async function issueBook(bookId){

const res=await fetch(BASE_URL+"/issues/issue",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({
bookId,
username
})

});

const data=await res.json();

alert(data.message);

loadBooks();
loadIssuedBooks();
loadFine();

}


/* LOAD ISSUED BOOKS */

async function loadIssuedBooks(){

const res=await fetch(BASE_URL+"/issues/user/"+username);
const data=await res.json();

const list=document.getElementById("issuedList");

list.innerHTML="";

let next="--";

(data.issues || []).forEach(function(issue){

const returnDate=new Date(issue.dueDate).toDateString();

if(next==="--"){
next=returnDate;
}

list.innerHTML+=`

<div class="book-card">

<b>${issue.bookId.title}</b><br>
Issued: ${new Date(issue.issueDate).toDateString()}<br>
Return By: ${returnDate}

</div>

`;

});

const issuedCount = data.issues.length;
const countElement = document.getElementById("issuedCount");

countElement.innerText = issuedCount + " / 3";

countElement.classList.remove("green","orange","red");

if(issuedCount === 1){
countElement.classList.add("green");
}
else if(issuedCount === 2){
countElement.classList.add("orange");
}
else if(issuedCount >= 3){
countElement.classList.add("red");
}

document.getElementById("nextReturn").innerText = next;
}


/* LOAD FINE */

async function loadFine(){

const res=await fetch(BASE_URL+"/issues/fine/"+username);
const data=await res.json();

document.getElementById("dues").innerText=data.fine;

}


/* SEARCH */

function searchBooks(){

const text=document.getElementById("search").value.toLowerCase();

const filtered=books.filter(function(b){
return b.title.toLowerCase().includes(text);
});

displayBooks(filtered);

}


/* LOGOUT */

function logout(){
localStorage.clear();
window.location="index.html";
}


/* CHANGE PASSWORD */

function changePassword(){
alert("Change password feature coming soon");
}


/* START */

loadBooks();
loadIssuedBooks();
loadFine();

</script>

</body>
</html>
