<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6fb;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.container{
padding:30px;
max-width:900px;
margin:auto;
}

.field{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
}

.book-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:6px 14px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
cursor:pointer;
}

button:disabled{
background:gray;
}

.section-title{
margin-top:30px;
margin-bottom:10px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="navbar">

<h2>Student Dashboard</h2>

<button onclick="logout()">Logout</button>

</div>


<div class="container">

<input id="search" class="field" placeholder="Search books..." onkeyup="searchBooks()">


<div class="section-title">Available Books</div>
<div id="bookList"></div>


<div class="section-title">My Issued Books</div>
<div id="issuedList"></div>


<div class="section-title">
Total Dues: ₹<span id="dues">0</span>
</div>

</div>


<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

let books=[];
let issuedBooks=[];



async function loadBooks(){

const res=await fetch(`${BASE_URL}/books`);
const data=await res.json();

books=data.books;

displayBooks(books);

}


function displayBooks(bookArray){

const list=document.getElementById("bookList");

list.innerHTML="";

bookArray.forEach(book=>{

const disabled=book.available===0 ? "disabled":"";

list.innerHTML+=`
<div class="book-card">

<b>${book.title}</b><br>
Author: ${book.author}<br>
Available: ${book.available}

<br><br>

<button ${disabled} onclick="issueBook('${book._id}')">
Issue
</button>

</div>
`;

});

}



async function issueBook(id){

if(issuedBooks.length>=3){

alert("Maximum 3 books allowed");

return;

}

await fetch(`${BASE_URL}/issue`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
bookId:id,
userId:localStorage.getItem("userId")
})
});

loadBooks();
loadIssuedBooks();

}



async function loadIssuedBooks(){

const res=await fetch(`${BASE_URL}/issued/${localStorage.getItem("userId")}`);
const data=await res.json();

issuedBooks=data.books;

const list=document.getElementById("issuedList");

list.innerHTML="";

data.books.forEach(book=>{

const issueDate=new Date(book.issueDate).toLocaleDateString();
const returnDate=new Date(book.returnDate).toLocaleDateString();

list.innerHTML+=`

<div class="book-card">

<b>${book.title}</b><br>
Author: ${book.author}<br>

Issued Date: ${issueDate}<br>
Submit Date: ${returnDate}

</div>

`;

});

}



function searchBooks(){

const text=document.getElementById("search").value.toLowerCase();

const filtered=books.filter(b=>
b.title.toLowerCase().includes(text)
);

displayBooks(filtered);

}



function logout(){

localStorage.clear();
window.location.href="index.html";

}



loadBooks();
loadIssuedBooks();

</script>

</body>
</html>
