<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, Arial;
}

body{
background:url("background.jpg") center/cover no-repeat fixed;
min-height:100vh;
overflow-x:hidden;
}

/* BLUR */

.blur-bg::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(8px);
z-index:-1;
}

/* NAVBAR */

.navbar{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:15px 20px;
display:flex;
align-items:center;
gap:10px;
height:70px;
position:relative;
}

.navbar img{
width:40px;
}

.navbar h2{
font-weight:600;
}

/* PROFILE ICON (RIGHT CORNER) */

.profile-icon{
width:40px;
height:40px;
border-radius:50%;
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
object-fit:cover;
border:2px solid white;
background:white;
}

/* MAIN */

.container{
max-width:1100px;
margin:40px auto 20px auto;
padding:20px;
}

/* SEARCH */

.field{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
}

/* BOOK GRID */

#bookList{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* BOOK CARD */

.book-card{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.book-card h4{
margin-bottom:8px;
}

.book-card button{
margin-top:10px;
background:#667eea;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.book-card button:hover{
background:#5563d6;
}

.book-card button:disabled{
background:#999;
}

/* ISSUED */

.issued-section{
margin-top:30px;
}

/* MOBILE */

@media(max-width:768px){

#bookList{
grid-template-columns:1fr;
}

}

</style>

</head>

<body class="blur-bg">

<!-- NAVBAR -->

<div class="navbar">

<img src="logo.png">

<h2>Student Dashboard</h2>

<img src="profile.jpg" class="profile-icon">

</div>

<!-- MAIN -->

<div class="container">

<input id="search" class="field" placeholder="Search books..." onkeyup="searchBooks()">

<h3>Available Books</h3>

<div id="bookList"></div>

<div class="issued-section">

<h3>My Issued Books</h3>

<div id="issuedList"></div>

<div style="margin-top:10px;">
Total Dues: ₹<span id="dues">0</span>
</div>

</div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

/* LOAD BOOKS */

async function loadBooks(){

const res = await fetch(`${BASE_URL}/books`);
const data = await res.json();

const list = document.getElementById("bookList");

list.innerHTML="";

data.books.forEach(book=>{

list.innerHTML += `

<div class="book-card">

<h4>${book.title}</h4>

<p>Author: ${book.author}</p>

<p>Available: ${book.quantity}</p>

<button ${book.quantity==0 ? "disabled":""} onclick="issueBook('${book._id}')">
${book.quantity==0 ? "Not Available":"Issue"}
</button>

</div>

`;

});

}

/* ISSUE BOOK */

async function issueBook(bookId){

const username = localStorage.getItem("username");

await fetch(`${BASE_URL}/issues`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
bookId,
username
})

});

alert("Book Issued");

loadBooks();
loadIssued();

}

/* LOAD ISSUED */

async function loadIssued(){

const username = localStorage.getItem("username");

const res = await fetch(`${BASE_URL}/issues`);
const data = await res.json();

const list = document.getElementById("issuedList");

list.innerHTML="";

let dues=0;

data.issues.forEach(issue=>{

if(issue.username===username){

const today=new Date();
const due=new Date(issue.dueDate);

let fine=0;

if(today>due){
fine=Math.ceil((today-due)/(1000*60*60*24));
}

dues+=fine;

list.innerHTML+=`

<div class="book-card">

<h4>${issue.bookId.title}</h4>

<p>Due: ${new Date(issue.dueDate).toDateString()}</p>

<p>Fine: ₹${fine}</p>

</div>

`;

}

});

document.getElementById("dues").innerText=dues;

}

/* SEARCH */

function searchBooks(){

const input=document.getElementById("search").value.toLowerCase();
const cards=document.querySelectorAll(".book-card");

cards.forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(input) ? "block":"none";
});

}

/* INIT */

loadBooks();
loadIssued();

</script>

</body>
</html>
