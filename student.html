<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="blur-bg">

<div class="navbar">

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="width:40px;">
<h2>Student Dashboard</h2>
</div>

<button onclick="logout()" class="login-btn" style="width:120px;height:35px;padding:0;">Logout</button>

</div>

<div class="container">

<input id="search" class="field" placeholder="Search books..." onkeyup="searchBooks()">

<div id="bookList"></div>

<div class="total-dues">
Total Dues: ₹0
</div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

let books=[];

async function loadBooks(){

const res=await fetch(`${BASE_URL}/books`);
const data=await res.json();

books=data.books;

displayBooks(books);

}

function displayBooks(bookArray){

const list=document.getElementById("bookList");

list.innerHTML="";

bookArray.forEach(book=>{

list.innerHTML+=`

<div class="book-card">

<h3>${book.title}</h3>

<p>Author: ${book.author}</p>

<p>Available: ${book.quantity}</p>

${book.quantity > 0 
? `<button onclick="issueBook('${book._id}')">Issue</button>` 
: `<button disabled>Not Available</button>`
}

</div>

`;

});

}

function searchBooks(){

let value=document.getElementById("search").value.toLowerCase();

let filtered=books.filter(book =>
book.title.toLowerCase().includes(value)
);

displayBooks(filtered);

}

async function issueBook(bookId){

const username=localStorage.getItem("username");

const res=await fetch(`${BASE_URL}/issues/issue`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
bookId,
username
})

});

const data=await res.json();

alert(data.message);

if(data.issue){

alert(
"Issue Date: "+ new Date(data.issue.issueDate).toDateString() +
"\nReturn Before: "+ new Date(data.issue.dueDate).toDateString()
);

}

loadBooks();
loadFine();

}

async function loadFine(){

const username=localStorage.getItem("username");

const res=await fetch(`${BASE_URL}/issues/fine/${username}`);

const data=await res.json();

document.querySelector(".total-dues").innerText =
"Total Dues: ₹"+data.fine;

}

function logout(){

localStorage.clear();
window.location="index.html";

}

loadBooks();
loadFine();

</script>

</body>
</html>
