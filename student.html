<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="blur-bg">

<div class="navbar">

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="width:40px;">
<h2>Student Dashboard</h2>
</div>

<button onclick="logout()" class="login-btn" style="width:120px;height:35px;padding:0;">
Logout
</button>

</div>

<div class="container">

<input id="search" class="field" placeholder="Search books..." onkeyup="searchBooks()">

<h3>Available Books</h3>

<div id="bookList"></div>

<h3>My Issued Books</h3>

<div id="issuedList"></div>

<div class="total-dues">
Total Dues: ₹<span id="dues">0</span>
</div>

</div>

<script>

const BASE_URL="https://smart-library-backend-3762.onrender.com";

let books=[];

const username=localStorage.getItem("username");

/* LOAD BOOKS */

async function loadBooks(){

const res=await fetch(`${BASE_URL}/books`);
const data=await res.json();

books=data.books;

displayBooks(books);

}

/* DISPLAY BOOKS */

function displayBooks(bookArray){

const list=document.getElementById("bookList");

list.innerHTML="";

bookArray.forEach(book=>{

list.innerHTML+=`

<div class="book-card">

<b>${book.title}</b><br>

Author: ${book.author}<br>

Available: ${book.quantity}

<br><br>

${book.quantity>0
? `<button onclick="issueBook('${book._id}')">Issue</button>`
: `<button disabled>Not Available</button>`
}

</div>

`;

});

}

/* ISSUE BOOK */

async function issueBook(bookId){

const res=await fetch(`${BASE_URL}/issues/issue`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
bookId,
username
})

});

const data=await res.json();

alert(data.message || "Book Issued");

if(data.success){
loadBooks();
loadIssuedBooks();
loadFine();
}

}

/* LOAD ISSUED BOOKS */

async function loadIssuedBooks(){

const res=await fetch(`${BASE_URL}/issues/user/${username}`);

const data=await res.json();

const list=document.getElementById("issuedList");

list.innerHTML="";

data.issues.forEach(issue=>{

list.innerHTML+=`

<div class="book-card">

<b>${issue.bookId.title}</b><br>

Issued: ${new Date(issue.issueDate).toDateString()}<br>

Return By: ${new Date(issue.dueDate).toDateString()}

</div>

`;

});

}

/* LOAD FINE */

async function loadFine(){

const res=await fetch(`${BASE_URL}/issues/fine/${username}`);

const data=await res.json();

document.getElementById("dues").innerText=data.fine;

}

/* SEARCH BOOKS */

function searchBooks(){

const text=document.getElementById("search").value.toLowerCase();

const filtered=books.filter(b=>
b.title.toLowerCase().includes(text)
);

displayBooks(filtered);

}

/* LOGOUT */

function logout(){

localStorage.clear();

window.location.href="index.html";

}

/* PAGE LOAD */

loadBooks();
loadIssuedBooks();
loadFine();

</script>
</body>
</html>
